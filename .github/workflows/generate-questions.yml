name: Generate Daily Questions

on:
  schedule:
    # Run at 00:15 UTC daily (avoid top-of-minute rush; ready for Asian timezones in the morning)
    - cron: '15 0 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Defaults to tomorrow.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate questions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python generate-questions.py "${{ github.event.inputs.date }}"
          else
            python generate-questions.py
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add questions/
          git diff --staged --quiet || git commit -m "📚 Add daily questions $(date -u +%Y-%m-%d)"
          git push